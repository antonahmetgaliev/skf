<app-modal title="New Custom Championship" width="md" [(open)]="open">
  <app-form-field label="Name *">
    <input
      type="text"
      [(ngModel)]="name"
      placeholder="e.g. SKF GT3 Championship S3"
    />
  </app-form-field>

  <app-form-field label="Game *">
    <input
      type="text"
      [(ngModel)]="game"
      placeholder="e.g. ACC, iRacing"
    />
  </app-form-field>

  <app-form-field label="Car Class">
    <input
      type="text"
      [(ngModel)]="carClass"
      placeholder="e.g. GT3, LMP2"
    />
  </app-form-field>

  <app-form-field label="Description">
    <textarea
      [(ngModel)]="description"
      placeholder="Optional description..."
      rows="3"
    ></textarea>
  </app-form-field>

  <div class="races-section">
    <div class="races-header">
      <h4>Races</h4>
      <app-btn variant="ghost" size="sm" (click)="addRaceRow()">+ Add Race</app-btn>
    </div>
    @for (race of races; track $index; let i = $index) {
      <div class="race-row">
        <input
          class="form-control race-input"
          type="date"
          [(ngModel)]="race.date"
          placeholder="Date"
        />
        <input
          class="form-control race-input"
          type="text"
          [(ngModel)]="race.track"
          placeholder="Track name"
        />
        @if (races.length > 1) {
          <app-btn variant="ghost" size="sm" class="btn-remove" (click)="removeRaceRow(i)">&#10005;</app-btn>
        }
      </div>
    }
  </div>

  <div modal-footer>
    <app-btn variant="ghost" (click)="open.set(false)">Cancel</app-btn>
    <app-btn
      variant="accent"
      [disabled]="submitting || !name.trim() || !game.trim()"
      (click)="submit()"
    >
      {{ submitting ? 'Creating...' : 'Create Championship' }}
    </app-btn>
  </div>
</app-modal>
