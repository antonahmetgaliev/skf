@if (streams().length > 0) {
  <div class="broadcasts-section">
    <p class="eyebrow center">Watch</p>
    <h2 class="section-title">Recent Broadcasts</h2>
    <div class="broadcast-grid">
      @for (stream of streams(); track stream.videoId) {
        <app-card class="broadcast-card">
        <a
          class="broadcast-link"
          [href]="'https://www.youtube.com/watch?v=' + stream.videoId"
          target="_blank"
          rel="noopener"
        >
          @if (stream.thumbnailUrl) {
            <img
              class="broadcast-thumb"
              [src]="stream.thumbnailUrl"
              [alt]="stream.title"
              loading="lazy"
            />
          }
          <div class="broadcast-info">
            <h3 class="broadcast-title">{{ stream.title }}</h3>
            <span class="broadcast-date">{{ formatDate(stream.publishedAt) }}</span>
          </div>
        </a>
        </app-card>
      }
    </div>
    <div class="view-all">
      <app-btn variant="outline" routerLink="/media">View All Media</app-btn>
    </div>
  </div>
}
